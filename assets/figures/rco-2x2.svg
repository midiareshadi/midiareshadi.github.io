<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" font-family="Georgia, serif">
  <rect width="720" height="460" fill="#FBF7EF"/>
  <text x="360" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#2b2b2b">The 2&#215;2: language &#215; backend</text>
  <text x="360" y="66" text-anchor="middle" font-size="14" fill="#6b6b6b">Same algorithm, four toolchains. Each column shares a backend; each row shares a language.</text>

  <!-- column headers -->
  <text x="300" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#2b2b2b">upstream LLVM</text>
  <text x="520" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#2b2b2b">libNVVM (NVIDIA)</text>
  <!-- row headers -->
  <text x="80" y="185" text-anchor="middle" font-size="15" font-weight="700" fill="#2b2b2b">Rust</text>
  <text x="80" y="320" text-anchor="middle" font-size="15" font-weight="700" fill="#2b2b2b">C++</text>

  <!-- cells -->
  <!-- Rust + upstream = cuda-oxide -->
  <rect x="150" y="135" width="300" height="120" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <text x="300" y="165" text-anchor="middle" font-size="17" font-weight="700" fill="#D97757">cuda-oxide</text>
  <text x="300" y="192" text-anchor="middle" font-size="12.5" fill="#444">generic ld/st</text>
  <text x="300" y="212" text-anchor="middle" font-size="12.5" fill="#444">elides read checks</text>
  <text x="300" y="236" text-anchor="middle" font-size="11.5" fill="#888">Rust &#8594; upstream LLVM (llc)</text>

  <!-- Rust + libNVVM = rust-cuda -->
  <rect x="470" y="135" width="180" height="120" rx="8" fill="#FFFFFF" stroke="#c9bfa8" stroke-width="1.5"/>
  <text x="560" y="165" text-anchor="middle" font-size="17" font-weight="700" fill="#2b2b2b">rust-cuda</text>
  <text x="560" y="192" text-anchor="middle" font-size="12.5" fill="#444">global ld/st</text>
  <text x="560" y="212" text-anchor="middle" font-size="12.5" fill="#444">keeps bounds traps</text>
  <text x="560" y="236" text-anchor="middle" font-size="11.5" fill="#888">Rust &#8594; libNVVM</text>

  <!-- C++ + upstream = clang -->
  <rect x="150" y="270" width="300" height="120" rx="8" fill="#FFFFFF" stroke="#c9bfa8" stroke-width="1.5"/>
  <text x="300" y="300" text-anchor="middle" font-size="17" font-weight="700" fill="#2b2b2b">clang</text>
  <text x="300" y="327" text-anchor="middle" font-size="12.5" fill="#444">global ld/st</text>
  <text x="300" y="347" text-anchor="middle" font-size="12.5" fill="#444">no checks (C++)</text>
  <text x="300" y="371" text-anchor="middle" font-size="11.5" fill="#888">C++ &#8594; upstream LLVM</text>

  <!-- C++ + libNVVM = nvcc -->
  <rect x="470" y="270" width="180" height="120" rx="8" fill="#FFFFFF" stroke="#c9bfa8" stroke-width="1.5"/>
  <text x="560" y="300" text-anchor="middle" font-size="17" font-weight="700" fill="#2b2b2b">nvcc</text>
  <text x="560" y="327" text-anchor="middle" font-size="12.5" fill="#444">global ld/st</text>
  <text x="560" y="347" text-anchor="middle" font-size="12.5" fill="#444">no checks (C++)</text>
  <text x="560" y="371" text-anchor="middle" font-size="11.5" fill="#888">C++ &#8594; libNVVM</text>

  <text x="360" y="425" text-anchor="middle" font-size="12.5" fill="#6b6b6b">cuda-oxide is the only cell with generic addressing &#8212; not shared by the other Rust cell or the other upstream-LLVM cell.</text>
  <text x="360" y="445" text-anchor="middle" font-size="12.5" fill="#6b6b6b">The two Rust cells make opposite safety choices.</text>
</svg>
