<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" font-family="Georgia, serif">
  <rect width="720" height="440" fill="#FBF7EF"/>
  <text x="360" y="38" text-anchor="middle" font-size="21" font-weight="700" fill="#2b2b2b">SASS instruction totals: before and after the u32 change</text>
  <text x="360" y="62" text-anchor="middle" font-size="13" fill="#6b6b6b">Whole-kernel machine instruction counts. The C++ versions are unchanged; only the Rust loop index changed.</text>

  <!-- baseline -->
  <line x1="80" y1="340" x2="660" y2="340" stroke="#999" stroke-width="1"/>
  <text x="55" y="230" text-anchor="middle" font-size="12" fill="#6b6b6b" transform="rotate(-90 55 230)">SASS instructions</text>

  <!-- scale: 56 -> 220px, so 1 instr ~ 3.93px. 48 -> 188px. baseline y=340 -->
  <!-- BEFORE group -->
  <text x="215" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#2b2b2b">usize loop (before)</text>
  <rect x="105" y="152" width="50" height="188" fill="#9c8f74"/>
  <text x="130" y="358" text-anchor="middle" font-size="11" fill="#444">nvcc</text>
  <text x="130" y="146" text-anchor="middle" font-size="12" font-weight="700" fill="#2b2b2b">48</text>
  <rect x="165" y="152" width="50" height="188" fill="#9c8f74"/>
  <text x="190" y="358" text-anchor="middle" font-size="11" fill="#444">clang</text>
  <text x="190" y="146" text-anchor="middle" font-size="12" font-weight="700" fill="#2b2b2b">48</text>
  <rect x="225" y="120" width="50" height="220" fill="#D97757"/>
  <text x="250" y="358" text-anchor="middle" font-size="11" fill="#444">oxide</text>
  <text x="250" y="114" text-anchor="middle" font-size="12" font-weight="700" fill="#2b2b2b">56</text>
  <rect x="285" y="120" width="50" height="220" fill="#D97757"/>
  <text x="310" y="358" text-anchor="middle" font-size="11" fill="#444">rustcuda</text>
  <text x="310" y="114" text-anchor="middle" font-size="12" font-weight="700" fill="#2b2b2b">56</text>

  <!-- divider -->
  <line x1="368" y1="95" x2="368" y2="380" stroke="#ddd6c5" stroke-width="1.5"/>

  <!-- AFTER group -->
  <text x="515" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#2b2b2b">u32 loop (after)</text>
  <rect x="405" y="152" width="50" height="188" fill="#9c8f74"/>
  <text x="430" y="358" text-anchor="middle" font-size="11" fill="#444">nvcc</text>
  <text x="430" y="146" text-anchor="middle" font-size="12" font-weight="700" fill="#2b2b2b">48</text>
  <rect x="465" y="152" width="50" height="188" fill="#9c8f74"/>
  <text x="490" y="358" text-anchor="middle" font-size="11" fill="#444">clang</text>
  <text x="490" y="146" text-anchor="middle" font-size="12" font-weight="700" fill="#2b2b2b">48</text>
  <rect x="525" y="152" width="50" height="188" fill="#D97757"/>
  <text x="550" y="358" text-anchor="middle" font-size="11" fill="#444">oxide</text>
  <text x="550" y="146" text-anchor="middle" font-size="12" font-weight="700" fill="#2b2b2b">48</text>
  <rect x="585" y="152" width="50" height="188" fill="#D97757"/>
  <text x="610" y="358" text-anchor="middle" font-size="11" fill="#444">rustcuda</text>
  <text x="610" y="146" text-anchor="middle" font-size="12" font-weight="700" fill="#2b2b2b">48</text>

  <text x="360" y="410" text-anchor="middle" font-size="13" fill="#2b2b2b" font-weight="700">48, 48, 48, 48 &#8212; exact parity. The whole difference was the 64-bit index math.</text>
</svg>
