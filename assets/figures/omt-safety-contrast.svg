<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="Georgia, serif">
  <rect width="720" height="420" fill="#FBF7EF"/>
  <text x="360" y="38" text-anchor="middle" font-size="21" font-weight="700" fill="#2b2b2b">Same program, one bad index &#8212; two different results</text>
  <text x="360" y="62" text-anchor="middle" font-size="13" fill="#6b6b6b">gather reads src[1000000] from a 1024-element array. Checked by NVIDIA's compute-sanitizer.</text>

  <!-- Left: older build, safe -->
  <rect x="45" y="95" width="300" height="255" rx="10" fill="#eef5ef" stroke="#2e7d52" stroke-width="2"/>
  <text x="195" y="128" text-anchor="middle" font-size="15" font-weight="700" fill="#2e7d52">Older build (June, v0.2.0)</text>
  <text x="195" y="150" text-anchor="middle" font-size="11.5" font-family="Menlo, monospace" fill="#6b6b6b">commit faea395</text>

  <text x="70" y="188" font-size="12.5" fill="#2b2b2b">The PTX has a bounds check:</text>
  <text x="70" y="210" font-size="11.5" font-family="Menlo, monospace" fill="#444">setp.ge.u64 ... &#8594; exit</text>
  <text x="70" y="232" font-size="12.5" fill="#2b2b2b">The bad index is caught.</text>
  <text x="70" y="254" font-size="12.5" fill="#2b2b2b">The read never happens.</text>

  <rect x="70" y="278" width="250" height="52" rx="6" fill="#2e7d52"/>
  <text x="195" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">sanitizer: 0 errors</text>
  <text x="195" y="319" text-anchor="middle" font-size="11.5" fill="#e5f0e8">safe</text>

  <!-- Right: newer build, unsafe -->
  <rect x="375" y="95" width="300" height="255" rx="10" fill="#f9eeeb" stroke="#c0392b" stroke-width="2"/>
  <text x="525" y="128" text-anchor="middle" font-size="15" font-weight="700" fill="#c0392b">Newer build (July branch)</text>
  <text x="525" y="150" text-anchor="middle" font-size="11.5" font-family="Menlo, monospace" fill="#6b6b6b">commit 29396b7</text>

  <text x="400" y="188" font-size="12.5" fill="#2b2b2b">No bounds check in the PTX:</text>
  <text x="400" y="210" font-size="11.5" font-family="Menlo, monospace" fill="#444">ld.global   (unconditional)</text>
  <text x="400" y="232" font-size="12.5" fill="#2b2b2b">The bad index is used.</text>
  <text x="400" y="254" font-size="12.5" fill="#2b2b2b">It reads ~4 MB past the end.</text>

  <rect x="400" y="278" width="250" height="52" rx="6" fill="#c0392b"/>
  <text x="525" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">sanitizer: invalid read</text>
  <text x="525" y="319" text-anchor="middle" font-size="11.5" fill="#f6ddd7">out of bounds</text>

  <text x="360" y="385" text-anchor="middle" font-size="13" fill="#2b2b2b" font-weight="700">The same safe-Rust program. One build is safe; the other reads memory it should not.</text>
  <text x="360" y="406" text-anchor="middle" font-size="11.5" fill="#888">Reported as cuda-oxide issue #396.</text>
</svg>
