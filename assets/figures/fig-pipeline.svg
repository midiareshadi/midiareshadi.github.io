<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#b3aaa0"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="700" height="320" rx="10" fill="#faf8f3"/>

  <text x="350" y="28" text-anchor="middle" font-size="16" fill="#1a1a1a">Three compilers, one shared backend</text>

  <!-- column headers -->
  <text x="146" y="54" text-anchor="middle" font-size="11" fill="#888">source</text>
  <text x="276" y="54" text-anchor="middle" font-size="11" fill="#888">frontend</text>
  <text x="460" y="54" text-anchor="middle" font-size="11" fill="#888">backend (LLVM)</text>
  <text x="625" y="54" text-anchor="middle" font-size="11" fill="#888">output</text>

  <!-- row labels -->
  <text x="92" y="94"  text-anchor="end" font-size="12.5" fill="#D97757" font-weight="bold">cuda-oxide</text>
  <text x="92" y="156" text-anchor="end" font-size="12.5" fill="#666">clang</text>
  <text x="92" y="218" text-anchor="end" font-size="12.5" fill="#666">nvcc</text>

  <!-- ROW 1 : cuda-oxide (orange accent) -->
  <rect x="100" y="66" width="92"  height="48" rx="7" fill="#fdf0ea" stroke="#D97757" stroke-width="1.5"/>
  <text x="146" y="94" text-anchor="middle" font-size="13" fill="#1a1a1a">Rust</text>
  <line x1="192" y1="90" x2="224" y2="90" stroke="#b3aaa0" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="224" y="66" width="104" height="48" rx="7" fill="#ffffff" stroke="#cfc7b8"/>
  <text x="276" y="94" text-anchor="middle" font-size="13" fill="#1a1a1a">rustc + MIR</text>
  <line x1="328" y1="90" x2="360" y2="90" stroke="#b3aaa0" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="360" y="66" width="200" height="48" rx="7" fill="#eef3f5" stroke="#6E8B9E"/>
  <text x="460" y="94" text-anchor="middle" font-size="13" fill="#1a1a1a">upstream LLVM 21 (llc)</text>
  <line x1="560" y1="90" x2="592" y2="90" stroke="#b3aaa0" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="592" y="66" width="66"  height="48" rx="7" fill="#ffffff" stroke="#cfc7b8"/>
  <text x="625" y="94" text-anchor="middle" font-size="13" fill="#1a1a1a">PTX</text>

  <!-- ROW 2 : clang -->
  <rect x="100" y="128" width="92"  height="48" rx="7" fill="#ffffff" stroke="#cfc7b8"/>
  <text x="146" y="156" text-anchor="middle" font-size="13" fill="#1a1a1a">CUDA C++</text>
  <line x1="192" y1="152" x2="224" y2="152" stroke="#b3aaa0" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="224" y="128" width="104" height="48" rx="7" fill="#ffffff" stroke="#cfc7b8"/>
  <text x="276" y="156" text-anchor="middle" font-size="13" fill="#1a1a1a">clang</text>
  <line x1="328" y1="152" x2="360" y2="152" stroke="#b3aaa0" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="360" y="128" width="200" height="48" rx="7" fill="#eef3f5" stroke="#6E8B9E"/>
  <text x="460" y="156" text-anchor="middle" font-size="13" fill="#1a1a1a">upstream LLVM 21 (NVPTX)</text>
  <line x1="560" y1="152" x2="592" y2="152" stroke="#b3aaa0" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="592" y="128" width="66"  height="48" rx="7" fill="#ffffff" stroke="#cfc7b8"/>
  <text x="625" y="156" text-anchor="middle" font-size="13" fill="#1a1a1a">PTX</text>

  <!-- ROW 3 : nvcc -->
  <rect x="100" y="190" width="92"  height="48" rx="7" fill="#ffffff" stroke="#cfc7b8"/>
  <text x="146" y="218" text-anchor="middle" font-size="13" fill="#1a1a1a">CUDA C++</text>
  <line x1="192" y1="214" x2="224" y2="214" stroke="#b3aaa0" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="224" y="190" width="104" height="48" rx="7" fill="#ffffff" stroke="#cfc7b8"/>
  <text x="276" y="218" text-anchor="middle" font-size="13" fill="#1a1a1a">cicc</text>
  <line x1="328" y1="214" x2="360" y2="214" stroke="#b3aaa0" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="360" y="190" width="200" height="48" rx="7" fill="#f6efe7" stroke="#A8A29A"/>
  <text x="460" y="218" text-anchor="middle" font-size="13" fill="#1a1a1a">libNVVM (forked LLVM)</text>
  <line x1="560" y1="214" x2="592" y2="214" stroke="#b3aaa0" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="592" y="190" width="66"  height="48" rx="7" fill="#ffffff" stroke="#cfc7b8"/>
  <text x="625" y="218" text-anchor="middle" font-size="13" fill="#1a1a1a">PTX</text>

  <!-- notes -->
  <circle cx="16" cy="268" r="4" fill="#6E8B9E"/>
  <text x="28" y="272" font-size="12" fill="#333">cuda-oxide vs clang: same backend (upstream LLVM 21) <tspan font-weight="bold">isolates the language</tspan>.</text>
  <circle cx="16" cy="294" r="4" fill="#A8A29A"/>
  <text x="28" y="298" font-size="12" fill="#333">clang vs nvcc: same language (CUDA C++) <tspan font-weight="bold">isolates the backend</tspan>.</text>
</svg>
