<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" font-family="Georgia, serif">
  <rect width="720" height="430" fill="#FBF7EF"/>
  <text x="360" y="38" text-anchor="middle" font-size="21" font-weight="700" fill="#2b2b2b">The version tag does not pin the compiler</text>
  <text x="360" y="62" text-anchor="middle" font-size="13" fill="#6b6b6b">Two different version tags both download the same backend from the latest branch.</text>

  <!-- Two frontends on the left -->
  <rect x="45" y="110" width="170" height="60" rx="8" fill="#efe7d6" stroke="#c9bda1" stroke-width="1.5"/>
  <text x="130" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#2b2b2b">frontend v0.2.0</text>
  <text x="130" y="157" text-anchor="middle" font-size="11.5" fill="#6b6b6b">(the command you run)</text>

  <rect x="45" y="250" width="170" height="60" rx="8" fill="#efe7d6" stroke="#c9bda1" stroke-width="1.5"/>
  <text x="130" y="278" text-anchor="middle" font-size="14" font-weight="700" fill="#2b2b2b">frontend v0.2.1</text>
  <text x="130" y="297" text-anchor="middle" font-size="11.5" fill="#6b6b6b">(the command you run)</text>

  <!-- Arrows converging to one backend -->
  <line x1="215" y1="140" x2="440" y2="200" stroke="#D97757" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="215" y1="280" x2="440" y2="220" stroke="#D97757" stroke-width="2.5" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#D97757"/>
    </marker>
  </defs>
  <text x="300" y="150" text-anchor="middle" font-size="11" fill="#D97757" font-style="italic">both fetch</text>
  <text x="300" y="272" text-anchor="middle" font-size="11" fill="#D97757" font-style="italic">both fetch</text>

  <!-- One backend on the right -->
  <rect x="445" y="175" width="235" height="70" rx="8" fill="#D97757" stroke="#b85c3f" stroke-width="1.5"/>
  <text x="562" y="203" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">SAME backend</text>
  <text x="562" y="223" text-anchor="middle" font-size="12" fill="#fff" font-family="Menlo, monospace">commit 29396b7 (July 4)</text>
  <text x="562" y="238" text-anchor="middle" font-size="11" fill="#ffe9e0">the part that makes GPU code</text>

  <text x="360" y="360" text-anchor="middle" font-size="13" fill="#2b2b2b" font-weight="700">So "v0.2.1" is not one compiler. The backend tracks the latest branch, not the tag.</text>
  <text x="360" y="384" text-anchor="middle" font-size="12" fill="#888">The only exact name is the backend commit + date.</text>
</svg>
